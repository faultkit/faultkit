name: llm-api-degraded-https-test
description: Deterministic 429 on api.openai.com over HTTPS, for the proxy TLS integration test.
experiments:
  - name: openai-rate-limited
    fault:
      http_status: 429
      response_headers:
        Retry-After: "30"
    match:
      host: api.openai.com
      path: /v1/*
    probability: 1.0
