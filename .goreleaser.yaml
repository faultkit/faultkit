version: 2

project_name: faultkit

before:
  hooks:
    - go mod tidy

builds:
  - id: faultkit
    main: ./cmd/faultkit
    binary: faultkit
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/faultkit-dev/faultkit/internal/cli.version={{.Version}}
      - -X github.com/faultkit-dev/faultkit/internal/cli.commit={{.ShortCommit}}
      - -X github.com/faultkit-dev/faultkit/internal/cli.date={{.Date}}

archives:
  - id: faultkit
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  draft: false
  prerelease: auto

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'Merge'
