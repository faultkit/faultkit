<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 240" width="680" height="240" role="img" aria-label="faultkit — fault injection for the agent era" font-family="'JetBrains Mono','Fira Code','SFMono-Regular',Menlo,Consolas,monospace">
  <defs><clipPath id="d-fault"><rect x="0" y="94" width="680" height="26"/></clipPath></defs>
  <rect width="680" height="240" rx="24" fill="#0d1117"/>
  <g font-size="104" font-weight="700" text-anchor="middle">
    <!-- RGB-split ghosts: digital glitch = agent era -->
    <text x="340" y="130" fill="#22d3ee" opacity="0.85" transform="translate(-6,-3)">faultkit</text>
    <text x="340" y="130" fill="#f43f5e" opacity="0.85" transform="translate(6,3)">faultkit</text>
    <text x="340" y="130" fill="#e6edf3">faultkit</text>
    <!-- displaced slice = the injected fault -->
    <g clip-path="url(#d-fault)">
      <text x="340" y="130" fill="#e6edf3" transform="translate(20,0)">faultkit</text>
      <text x="340" y="130" fill="#22d3ee" opacity="0.9" transform="translate(15,0)">faultkit</text>
    </g>
  </g>
  <text x="340" y="188" text-anchor="middle" font-size="22" font-weight="500" letter-spacing="2" fill="#8b949e">fault injection for the agent era</text>
</svg>
