name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Pin toolchain to what setup-go installs. With GOTOOLCHAIN=auto (the
# default) Go can silently download a newer toolchain if go.mod or any
# dep declares a higher version — which would also bypass our exact
# go-version pin. `local` forces "use what's installed, don't fetch."
env:
  GOTOOLCHAIN: local

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install python deps for integration test
        run: pip install -r test/docker/requirements.txt

      - name: gofmt
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "::error::gofmt issues in:"
            echo "$diff"
            exit 1
          fi

      - name: go mod verify
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: Build
        run: make build

      - name: Unit tests
        run: make test

      - name: Integration tests
        run: make test-integration

  sec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache: true

      - name: Install gosec + nilaway + govulncheck
        # Pinned. Updating any of these is a deliberate edit, not whatever
        # `@latest` happened to be when CI fired. gosec >= v2.26 requires
        # go 1.25; we're on 1.24.0 (per go.mod + GOTOOLCHAIN=local).
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.22.9
          go install go.uber.org/nilaway/cmd/nilaway@v0.0.0-20260318203545-ad240b12fb4c
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Security checks
        run: make sec
