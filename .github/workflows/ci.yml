name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install python deps for integration test
        run: pip install openai==2.36.0 pytest==8.3.4

      - name: gofmt
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "::error::gofmt issues in:"
            echo "$diff"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: make build

      - name: Unit tests
        run: make test

      - name: Integration tests
        run: make test-integration

  sec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install gosec + nilaway
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install go.uber.org/nilaway/cmd/nilaway@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Security checks
        run: make sec
