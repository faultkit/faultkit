name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Pin toolchain to what setup-go installs. With GOTOOLCHAIN=auto (the
# default) Go can silently download a newer toolchain if go.mod or any
# dep declares a higher version — which would also bypass our exact
# go-version pin. `local` forces "use what's installed, don't fetch."
env:
  GOTOOLCHAIN: local

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.10'
          cache: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install python deps for integration test
        run: pip install -r test/docker/requirements.txt

      - name: gofmt
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "::error::gofmt issues in:"
            echo "$diff"
            exit 1
          fi

      - name: go mod verify
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: Build
        run: make build

      - name: Unit tests
        run: make test

      - name: Integration tests
        run: make test-integration

  sec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.10'
          cache: true

      - name: Install gosec + nilaway + govulncheck
        # Pinned. Updating any of these is a deliberate edit, not whatever
        # `@latest` happened to be when CI fired.
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.26.1
          go install go.uber.org/nilaway/cmd/nilaway@v0.0.0-20260318203545-ad240b12fb4c
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Security checks
        run: make sec

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.10'
          cache: true

      - name: Install golangci-lint
        # Pinned (v1 — matches .golangci.yml's v1 config). Migrating to
        # golangci-lint v2 is a separate, deliberate change. Never @latest.
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Lint
        run: make lint
